name: Deploy Backend

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}


      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Note: Assumes your docker hub repo is named ceylon-makeup-backend
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/ceylon-makeup-backend:latest

      - name: SSH Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /app
            cat << 'EOF' > docker-compose.yml
            services:
              npm-proxy-manager:
                image: 'jc21/nginx-proxy-manager:latest'
                restart: unless-stopped
                ports:
                  - '80:80'
                  - '81:81'
                  - '443:443'
                volumes:
                  - ./data:/data
                  - ./letsencrypt:/etc/letsencrypt

              backend:
                image: "${{ secrets.DOCKERHUB_USERNAME }}/ceylon-makeup-backend:latest"
                restart: unless-stopped
                ports:
                  - '5000:5000'
                environment:
                  - MONGO_URI=${{ secrets.MONGO_URI }}
                  - JWT_SECRET=${{ secrets.JWT_SECRET }}
                  - STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY }}
                  - STRIPE_WEBHOOK_SECRET=${{ secrets.STRIPE_WEBHOOK_SECRET }}
                  - PORT=5000


              frontend:
                image: "${{ secrets.DOCKERHUB_USERNAME }}/ceylon-makeup-frontend:latest"
                restart: unless-stopped
                ports:
                  - '3000:3000'
            EOF
            
            sudo docker compose pull backend
            sudo docker compose up -d --no-deps backend


